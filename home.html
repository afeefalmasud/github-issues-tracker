<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- FavIcon-->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/home.css">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="geist-font">
    <!-- header -->
    <header class="bg-base-100 shadow-sm py-5 md:py-3">
        <div class="navbar px-20 flex justify-between flex-col gap-3 md:flex-row md:gap-0">
            <div class="flex gap-3 items-center flex-col md:flex-row text-center md:text-left">
                <img src="assets/github-logo.png" alt="" class="w-9">
                <h2 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-3 flex-col md:flex-row items-center md:items-stretch">
                <div class="relative">
                    <input type="text" placeholder="Search issues..." class="input input-bordered w-full pl-10" />
                    <span class="absolute left-4 top-2 z-10 text-[#909090] icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                </div>
                <div class="pt-2 md:pt-0">
                    <button class="btn btn-primary">
                        <i class="fa-solid fa-plus"></i>
                        New Issue
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Main Section -->
    <main class="bg-[#eef6fc] min-h-screen">
        <div class="container mx-auto py-15 px-6 md:px-0">
            <!-- Toggle button -->
            <div class="flex gap-3 bg-[#ffffff] p-6 rounded-xl shadow-md justify-center md:justify-start">
                <button class="btn btn-primary md:px-10 font-medium rounded-md" id="all-btn">All</button>
                <button class="btn btn-soft btn-success md:px-10 font-medium rounded-md" id="open-btn">Open</button>
                <button class="btn btn-soft bg-purple-100 text-purple-600 hover:bg-purple-600 hover:text-purple-100 md:px-10 font-medium rounded-md border-0" id="closed-btn">Closed</button>
            </div>
            <!-- Issues -->
            <div class="flex justify-between items-center flex-col gap-3 md:flex-row md:items-stretch md:gap-0 p-6 rounded-xl shadow-md bg-[#ffffff] mt-4">
                <div class="flex gap-3 items-center">
                    <img src="assets/Aperture.png" alt="">
                    <div>
                        <h3 class="font-semibold text-[20px] text-[#1F2937]" id="issue-count"></h3>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-2 pt-2 md:pt-0">
                    <div class="flex items-center gap-1">
                        <img src="assets/open-status.png">
                        <p class="font-medium text-[#1F2937]">Open</p>
                    </div>
                    <div class="flex items-center gap-1">
                        <img src="assets/closed-status.png">
                        <p class="font-medium text-[#1F2937]">Closed</p>
                    </div>
                </div>
            </div>
            <!-- Card -->
            <div class="card-container p-8 md:p-14 rounded-xl shadow-md bg-[#ffffff] mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">

            </div>
        </div>
    </main>

    <!-- JavaScript-->
    <script src="scripts/script.js"></script>
</body>
</html>
