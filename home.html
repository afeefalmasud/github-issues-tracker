<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- FavIcon-->
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/style.css">

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="geist-font">
    <!-- header -->
    <header class="bg-base-100 shadow-sm">
        <div class="navbar px-20 flex justify-between">
            <div class="flex gap-3 items-center">
                <img src="assets/github-logo.png" alt="" class="w-9">
                <h2 class="font-semibold text-[24px]">GitHub Issues Tracker</h2>
            </div>
            <div class="flex gap-3">
                <div class="relative">
                    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto pl-10" />
                    <span class="absolute left-4 top-2 z-10 text-[#909090] icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                </div>
                <div class="">
                    <button class="btn btn-soft btn-primary">
                        <i class="fa-solid fa-plus"></i>
                        New Issue
                    </button>
                </div>
            </div>
        </div>
    </header>
    
    <!-- JavaScript-->
    <script src="scripts/script.js"></script>
</body>
</html>
